<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Banner V1 export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background: #111111; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.banner {
  width: 1584px;
  height: 396px;
  background: #111111;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-end;
  padding: 0 80px 0 360px;
}
.mark {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 96px;
  font-weight: 500;
  line-height: 1;
  letter-spacing: -0.035em;
  color: #ffffff;
  text-transform: uppercase;
  white-space: nowrap;
  margin-bottom: 24px;
}
.mark .sep {
  color: #D1F466;
  font-weight: 400;
  margin: 0 0.15em;
}
.url {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px;
  font-weight: 300;
  color: #ffffff;
  letter-spacing: 0.06em;
  opacity: 0.85;
}
</style>
</head>
<body>
<div class="banner">
  <div class="mark">UI<span class="sep">·</span>Design Systems</div>
  <div class="url">adrianapommot.com</div>
</div>
</body>
</html>
