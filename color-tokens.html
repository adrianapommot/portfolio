<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Tokens · Delta Design System</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#fff;color:#111;-webkit-font-smoothing:antialiased;min-width:1000px;overflow-y:auto;padding:32px 36px 40px}

.section-label{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#888;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid #E8E5DF}

.color-groups{display:grid;grid-template-columns:repeat(4,1fr);gap:0 24px;margin-bottom:36px}

.group-head{display:flex;align-items:center;gap:7px;margin-bottom:12px}
.group-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.group-name{font-size:13px;font-weight:700;color:#111}

.swatch-row{display:flex;align-items:center;gap:10px;padding:4px 0;border-bottom:1px solid #F2F0EC}
.swatch-row:last-child{border-bottom:none}
.swatch{width:44px;height:26px;border-radius:5px;flex-shrink:0;border:1px solid rgba(0,0,0,.07)}
.tok{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:500;color:#E6007A;letter-spacing:.005em;white-space:nowrap}

.feedback-section{margin-top:8px}

.main-footer{margin-top:28px;padding-top:18px;border-top:1px solid #E8E5DF;display:flex;align-items:center;gap:10px}
.mf-icon{width:28px;height:28px;opacity:.6;flex-shrink:0}
.mf-text{font-size:12px;color:#555;line-height:1.5}
.mf-text strong{font-weight:700;color:#111}
</style>
</head>
<body>

  <div class="section-label">Delta Brand Colors</div>
  <div class="color-groups" id="brand"></div>

  <div class="feedback-section">
    <div class="section-label">Delta Feedback Colors</div>
    <div class="color-groups" id="feedback"></div>
  </div>

  <div class="main-footer">
    <svg class="mf-icon" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="4" fill="#F9B500"/><circle cx="14" cy="14" r="9" stroke="#F9B500" stroke-width="1.5" stroke-dasharray="3 2"/></svg>
    <p class="mf-text"><strong>Cores com propósito.</strong> Cada cor existe para orientar, informar e criar experiências mais intuitivas e acessíveis.</p>
  </div>

<script>
const BRAND = [
  { name:'Primary',   dot:'#F9B500', colors:[['#CE9A23','darkest'],['#F0A60D','dark'],['#F9B500',''],['#FBCB4D','light'],['#FCE08F','lightest'],['#FEF6DB','ultralight']], key:'primary' },
  { name:'Secondary', dot:'#474B51', colors:[['#2A2D31','darkest'],['#474B51','dark'],['#6C7077',''],['#9498A0','light'],['#C6C9CE','lightest'],['#FFFFFF','ultralight']], key:'secondary' },
  { name:'Neutral',   dot:'#000000', colors:[['#000000','darkest'],['#5C5C5C','dark'],['#9C9C9C',''],['#C9C9C9','light'],['#ECECEC','lightest'],['#FFFFFF','ultralight']], key:'neutral' },
  { name:'Tertiary',  dot:'#8C5A84', colors:[['#4B2D49','darkest'],['#6E4068','dark'],['#8C5A84',''],['#A87CA0','light'],['#C9A8C3','lightest'],['#EDE4EC','ultralight']], key:'tertiary' },
];
const FEEDBACK = [
  { name:'Critical', dot:'#D43C56', colors:[['#8C2A39','darkest'],['#B23048','dark'],['#D43C56',''],['#E37486','light'],['#F0AEB8','lightest'],['#FBE7EB','ultralight']], key:'critical' },
  { name:'Success',  dot:'#1CC6A0', colors:[['#0E7A5F','darkest'],['#14997D','dark'],['#1CC6A0',''],['#5CD8BD','light'],['#A6E8DA','lightest'],['#DFF6F0','ultralight']], key:'success' },
  { name:'Warning',  dot:'#F5841A', colors:[['#C2590E','darkest'],['#DE6F0E','dark'],['#F5841A',''],['#F8A85C','light'],['#FBCD9F','lightest'],['#FDEAD7','ultralight']], key:'warning' },
  { name:'Info',     dot:'#1E6FC6', colors:[['#0D3A6A','darkest'],['#15549C','dark'],['#1E6FC6',''],['#5793D8','light'],['#9FC1E8','lightest'],['#D6E8F7','ultralight']], key:'info' },
];

function renderGroup(g) {
  const suffix = s => s ? `-${s}` : '';
  return `<div class="color-group">
    <div class="group-head">
      <div class="group-dot" style="background:${g.dot}"></div>
      <span class="group-name">${g.name}</span>
    </div>
    ${g.colors.map(([hex, suf]) => `
      <div class="swatch-row">
        <div class="swatch" style="background:${hex}${hex==='#FFFFFF'?';border-color:#ddd':''}"></div>
        <span class="tok">$color-${g.key}${suffix(suf)}</span>
      </div>`).join('')}
  </div>`;
}

document.getElementById('brand').innerHTML    = BRAND.map(renderGroup).join('');
document.getElementById('feedback').innerHTML = FEEDBACK.map(renderGroup).join('');
</script>
</body>
</html>
