<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Diagrama de Contrastes · Delta Design System</title>
<style>
:root{
  --black:#111; --bg:#FAFAF8; --line:#E8E5DF; --line-soft:#F2F0EC;
  --text:#111; --text-2:#555; --text-3:#888;
  --accent:#F9B500; --accent-dark:#CE9A23; --tok:#E6007A;
  --font:'Plus Jakarta Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:#fff;color:var(--text);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden}
.band{display:grid;grid-template-columns:auto 1fr auto;gap:clamp(28px,3vw,48px);align-items:end;padding:24px clamp(28px,3vw,40px) 22px;border-bottom:1px solid var(--line);background:var(--bg);flex-shrink:0}
.band-title-block{display:flex;flex-direction:column;gap:16px}
.band-eyebrow{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-dark)}
.band-title{font-size:clamp(38px,4.2vw,52px);font-weight:800;line-height:.94;letter-spacing:-.04em;color:var(--text);text-wrap:balance}
.band-desc{font-size:12.5px;line-height:1.6;color:var(--text-2);max-width:48ch;text-wrap:pretty}
.band-callout{display:flex;flex-direction:column;justify-content:flex-end;gap:3px;padding:16px;border-left:2px solid var(--accent);background:#fff;align-self:stretch}
.band-callout b{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.3}
.band-callout span{font-size:10.5px;color:var(--text-3);line-height:1.35}
@media(max-width:1080px){.band{grid-template-columns:1fr;align-items:flex-start;gap:14px}.band-callout{align-self:flex-start}}
.body{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fff;min-height:0}
.spec-toggle{position:fixed;top:14px;right:14px;z-index:50;display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:#fff;font-family:var(--font);font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-2);cursor:pointer;transition:.2s}
.spec-toggle:hover{background:var(--text);color:#fff;border-color:var(--text)}
.spec-toggle::before{content:"";width:6px;height:6px;background:var(--accent);display:block;border-radius:1px}
.spec-panel{position:fixed;top:54px;right:14px;z-index:50;width:300px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px 16px 16px;box-shadow:0 12px 40px -16px rgba(0,0,0,.25);font-family:var(--font)}
.spec-panel[hidden]{display:none}
.spec-panel h4{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.spec-panel dl{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:11.5px;line-height:1.5}
.spec-panel dt{font-family:var(--mono);font-weight:500;color:var(--text);white-space:nowrap}
.spec-panel dd{color:var(--text-2);font-family:var(--mono);font-size:10.5px}
.spec-panel dd em{font-style:normal;display:block;color:var(--text-3);font-family:var(--font);font-size:10px;letter-spacing:.02em}

.legend-bar{display:flex;align-items:center;gap:18px;padding:10px clamp(20px,2.4vw,28px);border-bottom:1px solid var(--line);background:#fff;flex-shrink:0}
.lb-label{font-size:9.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#999}
.lb-set{display:flex;gap:12px}
.lb-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#555}
.lb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.d-aa{background:#1A7535}
.d-aaa{background:#0C4E20}
.d-fail{background:#C62828}
.tscroller{flex:1;overflow:auto;min-height:0}
table{border-collapse:collapse}
th.th-corner{position:sticky;left:0;top:0;z-index:25;background:#fff;width:185px;min-width:185px;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
th.th-col{position:sticky;top:0;z-index:10;background:#fff;min-width:62px;width:62px;padding:0 3px 3px;vertical-align:bottom;border-bottom:1px solid var(--line)}
.sw-col{height:42px;border-radius:5px 5px 0 0}
.td-rh{position:sticky;left:0;z-index:5;background:#fff;border-right:1px solid var(--line)}
.rh-inner{display:flex;align-items:center;gap:8px;padding:6px 10px;white-space:nowrap}
.rh-swatch{width:13px;height:13px;border-radius:3px;flex-shrink:0;border:1px solid rgba(0,0,0,.08)}
.rh-token{font-family:var(--mono);font-size:9.5px;color:var(--tok)}
.td-d{padding:5px 3px;text-align:center;border-bottom:1px solid var(--line-soft);border-right:1px solid var(--line-soft)}
.c-num{display:block;font-family:var(--mono);font-size:9px;color:#333;margin-bottom:2px}
.c-badge{display:inline-block;font-size:7.5px;font-weight:700;padding:1.5px 4px;border-radius:3px;letter-spacing:.02em;line-height:1.4}
.bg-aaa{background:#D4EDDB;color:#0C4E20}
.bg-aa{background:#EBF7EF;color:#1A7535}
.bg-fail{color:#C62828;font-size:10px}
.c-same{font-family:var(--mono);font-size:11px;color:#C8C5C0}
tr.g-sep td{border-top:1.5px solid #D8D5CF}
</style>
</head>
<body>
<main class="body">
<div class="legend-bar">
  <span class="lb-label">RATIO</span>
  <div class="lb-set">
    <div class="lb-item"><div class="lb-dot d-aa"></div><span>AA (≥ 4.5)</span></div>
    <div class="lb-item"><div class="lb-dot d-aaa"></div><span>AAA (≥ 7)</span></div>
  </div>
  <span class="lb-label" style="margin-left:10px">TEXT</span>
  <div class="lb-set">
    <div class="lb-item"><div class="lb-dot d-fail"></div><span>FAIL (&lt; 4.5)</span></div>
  </div>
</div>
<div class="tscroller">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
</main>
<script>
const ROWS = [
  {t:'$color-darkest',h:'#2A2D31'},{t:'$color-dark',h:'#474B51'},{t:'$color',h:'#6C7077'},{t:'$color-light',h:'#9498A0'},{t:'$color-lightest',h:'#C6C9CE'},
  {t:'$color-primary-darkest',h:'#CE9A23'},{t:'$color-primary-dark',h:'#F0A60D'},{t:'$color-primary',h:'#F9B500'},{t:'$color-primary-light',h:'#FBCB4D'},{t:'$color-primary-lightest',h:'#FCE08F'},
  {t:'$color-tertiary-darkest',h:'#4B2D49'},{t:'$color-tertiary-dark',h:'#6E4068'},{t:'$color-tertiary',h:'#8C5A84'},{t:'$color-tertiary-light',h:'#A87CA0'},{t:'$color-tertiary-lightest',h:'#C9A8C3'},
  {t:'$color-critical-darkest',h:'#8C2A39'},{t:'$color-critical-dark',h:'#B23048'},{t:'$color-critical',h:'#D43C56'},{t:'$color-critical-light',h:'#E37486'},{t:'$color-critical-lightest',h:'#F0AEB8'},
  {t:'$color-success-darkest',h:'#0E7A5F'},{t:'$color-success-dark',h:'#14997D'},{t:'$color-success',h:'#1CC6A0'},{t:'$color-success-light',h:'#5CD8BD'},{t:'$color-success-lightest',h:'#A6E8DA'},
  {t:'$color-warning-darkest',h:'#C2590E'},{t:'$color-warning-dark',h:'#DE6F0E'},{t:'$color-warning',h:'#F5841A'},{t:'$color-warning-light',h:'#F8A85C'},{t:'$color-warning-lightest',h:'#FBCD9F'},
  {t:'$color-info-darkest',h:'#0D3A6A'},{t:'$color-info-dark',h:'#15549C'},{t:'$color-info',h:'#1E6FC6'},{t:'$color-info-light',h:'#5793D8'},{t:'$color-info-lightest',h:'#9FC1E8'},
  {t:'$color-neutral-darkest',h:'#000000'},{t:'$color-neutral-dark',h:'#5C5C5C'},{t:'$color-neutral',h:'#9C9C9C'},{t:'$color-neutral-light',h:'#C9C9C9'},{t:'$color-neutral-lightest',h:'#ECECEC'},
];
const COLS = ['#2A2D31','#474B51','#9498A0','#C6C9CE','#CE9A23','#F9B500','#FBCB4D','#4B2D49','#D43C56','#8C2A39','#1CC6A0','#F5841A','#1E6FC6'];
const GROUP_STARTS = new Set([5,10,15,20,25,30,35]);
function lin(c){c/=255;return c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);}
function lum(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 0.2126*lin(r)+0.7152*lin(g)+0.0722*lin(b);}
function cr(a,b){const l1=lum(a),l2=lum(b),hi=Math.max(l1,l2),lo=Math.min(l1,l2);return(hi+0.05)/(lo+0.05);}
function badge(r){if(r>=7)return'<span class="c-badge bg-aaa">AAA</span>';if(r>=4.5)return'<span class="c-badge bg-aa">AA</span>';return'<span class="c-badge bg-fail">✗</span>';}
let th='<tr><th class="th-corner"></th>';
COLS.forEach(h=>{th+=`<th class="th-col"><div class="sw-col" style="background:${h}"></div></th>`;});
th+='</tr>';
document.getElementById('thead').innerHTML=th;
let tb='';
ROWS.forEach((row,i)=>{
  const sep=GROUP_STARTS.has(i)?' class="g-sep"':'';
  tb+=`<tr${sep}><td class="td-rh"><div class="rh-inner"><div class="rh-swatch" style="background:${row.h}"></div><span class="rh-token">${row.t}</span></div></td>`;
  COLS.forEach(col=>{
    if(row.h.toLowerCase()===col.toLowerCase()){tb+='<td class="td-d"><span class="c-same">·</span></td>';return;}
    const r=cr(row.h,col);
    tb+=`<td class="td-d"><span class="c-num">${r.toFixed(2)}</span>${badge(r)}</td>`;
  });
  tb+='</tr>';
});
document.getElementById('tbody').innerHTML=tb;
</script>
</body>
</html>
